<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        body{
            background-color: #1a0b2e;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            color: #333;
            margin-top: 80px;
        }
        .container{
            margin-top: 50px;
        }
        .main-card {
            border-radius: 20px;
            border: 2px solid #bd93f9;
            background-color: #4b2c61;
            box-shadow: 0 0 25px 8px rgba(189, 147, 249, 0.5); 
            padding: 20px;
        }
        h2{
            text-align: center;
            margin-top: 10px;
            color: #f8f8f2;
        }
        #note{
            margin-left: 10px;
            color: #fcfc91;
            font-weight: bold;
            cursor: pointer;
        }
        .instructions-list {
            color: #f8f8f2;
            font-size: 0.9rem;
        }
        .form-control {
            border: 1px solid #6272a4;
        }
        .form-control:focus {
            border-color: #bd93f9;
            box-shadow: 0 0 10px rgba(189, 147, 249, 0.5);
        }
        .btn-check-custom {
            background-color: #bd93f9;
            color: #282a36;
            transition: 0.3s;
        }
        .btn-check-custom:hover {
            background-color: #863fe9; /* Pinkish on hover */
            color: white;
            transform: scale(1.02);
        }
        .text-temp { color: #ff0000; }
        .text-humid { color: #007bff; }
        
    </style>

</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="card main-card">

                    <h2> Heat Index Checker </h2>
                    
                    <div class="card-body p-3">
                        <details ontoggle="note()">
                            <summary id="note">Note</summary>
                                <ul class="instructions-list mt-2">
                                    <li>Input the temperature (°C) and humidity (%), then click "Check" to see the heat index and its status </li>
                                </ul>
                        </details>

                        <div class="mt-3 mb-3">
                            <label for="tempInput" class="form-label fw-bold text-temp">Temperature (°C)</label>
                            <input type="number" id="tempInput" class="form-control" placeholder="e.g., 32">
                        </div>

                        <div class="mb-3">
                            <label for="humidInput" class="form-label fw-bold text-humid">Humidity (%)</label>
                            <input type="number" id="humidInput" class="form-control" placeholder="e.g., 65">
                        </div>

                        <button class="btn btn-check-custom w-100 fw-bold mb-3" onclick="calculateHeatIndex()">Check</button>

                    </div>  

                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateHeatIndex() {
            let temp = Number(document.getElementById('tempInput').value);
            let humidity = Number(document.getElementById('humidInput').value);
            
            if (temp === 0 || humidity === 0) {
                window.alert("Please enter valid numbers for both fields.");
                return;
            }

            let heatIndex = temp + (0.33 * humidity) - 4;
            let roundedIndex = Math.round(heatIndex);
            let status = "";

            if (roundedIndex >= 42) {
                status = "Extreme Heat / Danger";
            } else if (roundedIndex >= 38) {
                status = "Very Hot / Caution";
            } else if (roundedIndex >= 33) {
                status = "Hot";
            } else if (roundedIndex >= 28) {
                status = "Warm";
            } else {
                status = "Comfortable / Cool";
            }
            
            window.alert("Heat Index: " + roundedIndex + "°C\nStatus: " + status);
        }
    </script>
    
</body>
</html>
